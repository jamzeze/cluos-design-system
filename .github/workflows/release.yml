name: Release

# ALPHA-READINESS FREEZE: releases are manual-only during Alpha.
# Do not restore push/tag publishing without protected approval.
on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type PUBLISH_GITHUB_PACKAGES to run npm publish."
        required: true
        type: string

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_publish == 'PUBLISH_GITHUB_PACKAGES' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
