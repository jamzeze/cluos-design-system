# =============================================================================
# Bitwarden Secrets Map — CluOS Hermes
# Source of truth: Bitwarden vault "Cluos Infra"
# NO real values here — item names and env var mappings only
# =============================================================================

vault: "Cluos Infra"
version: "1.0"
last_updated: "2026-05-12"

# Format per entry:
#   bw_item:    exact Bitwarden item name
#   bw_field:   field within the item (default: password)
#   env_var:    environment variable name to export
#   connector:  which connector uses this secret
#   class:      required | recommended
#   rotate:     suggested rotation schedule

secrets:

  # ─── GitHub ───────────────────────────────────────────────────────────────
  - bw_item: "Hermes / GitHub PAT"
    bw_field: password
    env_var: GITHUB_TOKEN
    connector: github
    class: required
    rotate: 90d

  # ─── Google Workspace ─────────────────────────────────────────────────────
  - bw_item: "Hermes / Google OAuth"
    bw_field: "Client ID"
    env_var: GOOGLE_CLIENT_ID
    connector: google-workspace
    class: required
    rotate: never

  - bw_item: "Hermes / Google OAuth"
    bw_field: "Client Secret"
    env_var: GOOGLE_CLIENT_SECRET
    connector: google-workspace
    class: required
    rotate: 365d

  - bw_item: "Hermes / Google OAuth"
    bw_field: "Refresh Token"
    env_var: GOOGLE_REFRESH_TOKEN
    connector: google-workspace
    class: required
    rotate: on-revoke

  - bw_item: "Hermes / Google OAuth"
    bw_field: "Delegated Email"
    env_var: GMAIL_DELEGATED_EMAIL
    connector: gmail
    class: required
    rotate: never

  - bw_item: "Hermes / Google OAuth"
    bw_field: "Drive Root Folder ID"
    env_var: GOOGLE_DRIVE_ROOT_FOLDER_ID
    connector: google-drive
    class: required
    rotate: never

  # ─── Browserbase ──────────────────────────────────────────────────────────
  - bw_item: "Hermes / Browserbase API Key"
    bw_field: password
    env_var: BROWSERBASE_API_KEY
    connector: browserbase
    class: required
    rotate: 90d

  - bw_item: "Hermes / Browserbase API Key"
    bw_field: "Project ID"
    env_var: BROWSERBASE_PROJECT_ID
    connector: browserbase
    class: required
    rotate: never

  # ─── Firecrawl ────────────────────────────────────────────────────────────
  - bw_item: "Hermes / Firecrawl API Key"
    bw_field: password
    env_var: FIRECRAWL_API_KEY
    connector: firecrawl
    class: required
    rotate: 90d

  # ─── Obsidian ─────────────────────────────────────────────────────────────
  - bw_item: "Hermes / Obsidian REST API Key"
    bw_field: password
    env_var: OBSIDIAN_LOCAL_REST_API_KEY
    connector: obsidian
    class: required
    rotate: 180d

  - bw_item: "Hermes / Obsidian REST API Key"
    bw_field: "Vault Path"
    env_var: OBSIDIAN_VAULT_PATH
    connector: obsidian
    class: required
    rotate: never

  # ─── Apify ────────────────────────────────────────────────────────────────
  - bw_item: "Hermes / Apify API Token"
    bw_field: password
    env_var: APIFY_API_TOKEN
    connector: apify
    class: recommended
    rotate: 90d

  # ─── YouTube ──────────────────────────────────────────────────────────────
  - bw_item: "Hermes / YouTube API Key"
    bw_field: password
    env_var: YOUTUBE_API_KEY
    connector: youtube-transcripts
    class: recommended
    rotate: 365d

  # ─── Granola / Fathom ─────────────────────────────────────────────────────
  - bw_item: "Hermes / Granola API Key"
    bw_field: password
    env_var: GRANOLA_API_KEY
    connector: granola-fathom
    class: recommended
    rotate: 90d

  - bw_item: "Hermes / Fathom API Key"
    bw_field: password
    env_var: FATHOM_API_KEY
    connector: granola-fathom
    class: recommended
    rotate: 90d

  # ─── Telegram / CEO Agent ─────────────────────────────────────────────────
  - bw_item: "Hermes / Telegram Bot"
    bw_field: password
    env_var: TELEGRAM_BOT_TOKEN
    connector: ceo-agent
    class: required
    rotate: on-revoke

  - bw_item: "Hermes / Telegram Bot"
    bw_field: "Allowed User IDs"
    env_var: TELEGRAM_ALLOWED_USER_IDS
    connector: ceo-agent
    class: required
    rotate: never

  # ─── Hermes API ───────────────────────────────────────────────────────────
  - bw_item: "Hermes / API Key"
    bw_field: password
    env_var: HERMES_API_KEY
    connector: hermes
    class: required
    rotate: 90d

  - bw_item: "Hermes / API Key"
    bw_field: "API URL"
    env_var: HERMES_API_URL
    connector: hermes
    class: required
    rotate: never

  # ─── Bitwarden CLI (for automation only) ──────────────────────────────────
  - bw_item: "Hermes / Bitwarden CLI Service Account"
    bw_field: "Client ID"
    env_var: BW_CLIENTID
    connector: bitwarden
    class: required
    note: >
      Use a Bitwarden API key service account, not personal credentials.
      Available at: vault.bitwarden.com → Settings → API Key
    rotate: 180d

  - bw_item: "Hermes / Bitwarden CLI Service Account"
    bw_field: "Client Secret"
    env_var: BW_CLIENTSECRET
    connector: bitwarden
    class: required
    rotate: 180d
